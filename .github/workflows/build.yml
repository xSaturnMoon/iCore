name: Build iCore IPA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Verify Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Show schemes
        run: xcodebuild -project iCore.xcodeproj -list

      - name: Archive
        id: archive_step
        run: |
          xcodebuild archive \
            -project iCore.xcodeproj \
            -scheme iCore \
            -destination "generic/platform=iOS" \
            -archivePath $RUNNER_TEMP/iCore.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            SKIP_INSTALL=NO \
            2>&1 | tee $RUNNER_TEMP/archive_log.txt
          RESULT=${PIPESTATUS[0]}
          if [ $RESULT -ne 0 ]; then
            echo "::error::Archive failed."
            exit $RESULT
          fi

      - name: Upload Log to Dpaste
        if: failure()
        run: |
          git fetch origin main
          git reset --hard origin/main
          curl -s -F "content=<-" http://dpaste.com/api/v2/ < $RUNNER_TEMP/archive_log.txt > paste.txt
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add paste.txt
          git commit -m "chore: CI log URL"
          git push origin HEAD:main || true

      - name: Verify archive
        run: |
          ls -la $RUNNER_TEMP/iCore.xcarchive/Products/Applications/
          file $RUNNER_TEMP/iCore.xcarchive/Products/Applications/iCore.app/iCore

      - name: Create unsigned IPA manually
        run: |
          cd $RUNNER_TEMP/iCore.xcarchive/Products/Applications
          mkdir -p Payload
          cp -r iCore.app Payload/
          zip -r $RUNNER_TEMP/iCore.ipa Payload
          ls -la $RUNNER_TEMP/iCore.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: iCore-IPA
          path: ${{ runner.temp }}/iCore.ipa
          if-no-files-found: error
