name: Build iCore IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Get QEMU from UTM
        run: |
          mkdir -p iCore/Resources
          echo "Downloading UTM..."
          curl -L "https://github.com/utmapp/UTM/releases/download/v4.5.0/UTM.ipa" \
            -o utm.ipa --progress-bar
          echo "Contents of UTM IPA (searching for qemu):"
          unzip -l utm.ipa | grep -i qemu || echo "No qemu entries found"
          echo "---"
          echo "All executables in UTM IPA:"
          unzip -l utm.ipa | grep -v "/$" | awk '{print $NF}' | head -60
          echo "---"
          # Try all known paths
          unzip -j utm.ipa "Payload/UTM.app/qemu-system-aarch64" -d iCore/Resources/ 2>/dev/null && echo "Found at root" || true
          unzip -j utm.ipa "Payload/UTM.app/Frameworks/qemu-system-aarch64" -d iCore/Resources/ 2>/dev/null && echo "Found in Frameworks" || true
          unzip -j utm.ipa "Payload/UTM.app/Libraries/qemu-system-aarch64" -d iCore/Resources/ 2>/dev/null && echo "Found in Libraries" || true
          # Generic search
          if [ ! -f "iCore/Resources/qemu-system-aarch64" ]; then
            echo "Trying generic extraction..."
            unzip utm.ipa -d utm_tmp 2>/dev/null || true
            find utm_tmp -name "qemu-system-aarch64" 2>/dev/null | head -5
            QEMU_PATH=$(find utm_tmp -name "qemu-system-aarch64" 2>/dev/null | head -1)
            if [ -n "$QEMU_PATH" ]; then
              cp "$QEMU_PATH" iCore/Resources/qemu-system-aarch64
              echo "Copied from: $QEMU_PATH"
            fi
          fi
          if [ -f "iCore/Resources/qemu-system-aarch64" ]; then
            chmod +x iCore/Resources/qemu-system-aarch64
            echo "SUCCESS: QEMU binary ready"
            file iCore/Resources/qemu-system-aarch64
            ls -lh iCore/Resources/qemu-system-aarch64
          else
            echo "WARNING: QEMU not found — app will run in demo mode"
          fi
          rm -rf utm.ipa utm_tmp

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build App
        run: |
          xcodebuild build \
            -project iCore.xcodeproj \
            -scheme iCore \
            -destination "generic/platform=iOS" \
            -configuration Release \
            CONFIGURATION_BUILD_DIR=$HOME/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PRODUCT_BUNDLE_IDENTIFIER=com.xsaturnmoon.icore \
            GENERATE_INFOPLIST_FILE=NO \
            INFOPLIST_FILE=Info.plist

      - name: Fix Info.plist
        run: |
          PLIST="$HOME/build/iCore.app/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.xsaturnmoon.icore" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable iCore" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleDevelopmentRegion en" "$PLIST"
          echo "Bundle ID: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' $PLIST)"
          echo "QEMU in bundle:"
          ls -lh $HOME/build/iCore.app/Resources/qemu-system-aarch64 2>/dev/null || echo "Not present"

      - name: Package IPA
        run: |
          mkdir -p $HOME/Payload
          cp -r $HOME/build/iCore.app $HOME/Payload/
          cd $HOME
          zip -r iCore.ipa Payload/
          ls -lh iCore.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iCore-ipa
          path: ~/iCore.ipa
          