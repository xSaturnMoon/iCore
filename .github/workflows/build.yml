name: Build iCore IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project iCore.xcodeproj \
            -scheme iCore \
            -destination "generic/platform=iOS" \
            -archivePath "$HOME/iCore.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            SKIP_INSTALL=NO

      - name: Package IPA
        run: |
          APP_PATH=$(find "$HOME/iCore.xcarchive" -name "*.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          mkdir -p "$HOME/Payload"
          cp -r "$APP_PATH" "$HOME/Payload/"
          cd "$HOME"
          zip -r iCore.ipa Payload/
          ls -lh "$HOME/iCore.ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iCore-ipa
          path: ~/iCore.ipa
