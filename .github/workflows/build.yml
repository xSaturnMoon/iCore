name: Build iCore IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Download QEMU from UTM
        run: |
          mkdir -p iCore/Resources
          echo "Downloading UTM IPA..."
          curl -L "https://github.com/utmapp/UTM/releases/download/v4.5.0/UTM.ipa" \
            -o utm.ipa --progress-bar
          echo "Extracting QEMU binary..."
          unzip -j utm.ipa "Payload/UTM.app/qemu-system-aarch64" \
            -d iCore/Resources/ 2>/dev/null || true
          # Try alternative paths
          if [ ! -f "iCore/Resources/qemu-system-aarch64" ]; then
            unzip -p utm.ipa | strings | grep qemu || true
            unzip utm.ipa -d utm_full 2>/dev/null
            find utm_full -name "qemu-system-aarch64" -exec cp {} iCore/Resources/ \; 2>/dev/null || true
          fi
          if [ -f "iCore/Resources/qemu-system-aarch64" ]; then
            echo "QEMU found!"
            ls -lh iCore/Resources/qemu-system-aarch64
            chmod +x iCore/Resources/qemu-system-aarch64
          else
            echo "QEMU not found in UTM IPA — app will run in demo mode"
          fi
          rm -rf utm.ipa utm_full

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build App
        run: |
          xcodebuild build \
            -project iCore.xcodeproj \
            -scheme iCore \
            -destination "generic/platform=iOS" \
            -configuration Release \
            CONFIGURATION_BUILD_DIR=$HOME/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PRODUCT_BUNDLE_IDENTIFIER=com.xsaturnmoon.icore \
            GENERATE_INFOPLIST_FILE=NO \
            INFOPLIST_FILE=Info.plist

      - name: Fix Info.plist
        run: |
          PLIST="$HOME/build/iCore.app/Info.plist"
          echo "Fixing plist at: $PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.xsaturnmoon.icore" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable iCore" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleDevelopmentRegion en" "$PLIST"
          echo "Bundle ID is now:"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$PLIST"

      - name: Package IPA
        run: |
          mkdir -p $HOME/Payload
          cp -r $HOME/build/iCore.app $HOME/Payload/
          cd $HOME
          zip -r iCore.ipa Payload/
          ls -lh iCore.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iCore-ipa
          path: ~/iCore.ipa
