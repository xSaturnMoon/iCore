name: Build iCore IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Extract QEMU from UTM
        run: |
          curl -L "https://github.com/utmapp/UTM/releases/download/v4.5.0/UTM.ipa" -o utm.ipa --progress-bar
          unzip -q utm.ipa -d utm_tmp
          mkdir -p iCore/Resources
          cp "utm_tmp/Payload/UTM.app/Frameworks/qemu-aarch64-softmmu.framework/qemu-aarch64-softmmu" iCore/Resources/qemu-system-aarch64
          chmod +x iCore/Resources/qemu-system-aarch64
          cp -r utm_tmp/Payload/UTM.app/qemu iCore/Resources/qemu-data
          rm -rf utm.ipa utm_tmp
          ls -lh iCore/Resources/qemu-system-aarch64

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build App
        run: |
          xcodebuild build \
            -project iCore.xcodeproj \
            -scheme iCore \
            -destination "generic/platform=iOS" \
            -configuration Release \
            CONFIGURATION_BUILD_DIR=$HOME/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PRODUCT_BUNDLE_IDENTIFIER=com.xsaturnmoon.icore \
            GENERATE_INFOPLIST_FILE=NO \
            INFOPLIST_FILE=Info.plist

      - name: Inject QEMU and fix plist
        run: |
          APP=$HOME/build/iCore.app
          
          # Inject QEMU
          mkdir -p $APP/Resources
          cp iCore/Resources/qemu-system-aarch64 $APP/Resources/
          cp -r iCore/Resources/qemu-data $APP/Resources/
          
          # Write plist with no indentation to avoid XML corruption
          python3 - << 'PYEOF'
import plistlib, os
p = {
  'CFBundleDevelopmentRegion': 'en',
  'CFBundleExecutable': 'iCore',
  'CFBundleIdentifier': 'com.xsaturnmoon.icore',
  'CFBundleInfoDictionaryVersion': '6.0',
  'CFBundleName': 'iCore',
  'CFBundlePackageType': 'APPL',
  'CFBundleShortVersionString': '1.0',
  'CFBundleVersion': '1',
  'LSRequiresIPhoneOS': True,
  'UIFileSharingEnabled': True,
  'LSSupportsOpeningDocumentsInPlace': True,
  'UILaunchScreen': {},
  'UISupportedInterfaceOrientations~ipad': [
    'UIInterfaceOrientationPortrait',
    'UIInterfaceOrientationPortraitUpsideDown',
    'UIInterfaceOrientationLandscapeLeft',
    'UIInterfaceOrientationLandscapeRight',
  ],
}
path = os.path.expanduser('~/build/iCore.app/Info.plist')
with open(path, 'wb') as f:
  plistlib.dump(p, f, fmt=plistlib.FMT_BINARY)
print('Bundle ID:', p['CFBundleIdentifier'])
print('Plist written to:', path)
PYEOF

      - name: Package IPA
        run: |
          mkdir -p $HOME/Payload
          cp -r $HOME/build/iCore.app $HOME/Payload/
          cd $HOME
          zip -r iCore.ipa Payload/
          ls -lh iCore.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iCore-ipa
          path: ~/iCore.ipa
          