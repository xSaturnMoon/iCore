name: Build iCore IPA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Verify Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Show schemes
        run: xcodebuild -project iCore.xcodeproj -list

      - name: Archive
        run: |
          xcodebuild archive \
            -project iCore.xcodeproj \
            -scheme iCore \
            -destination "generic/platform=iOS" \
            -archivePath $RUNNER_TEMP/iCore.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            2>&1 | tee $RUNNER_TEMP/archive_log.txt
          RESULT=${PIPESTATUS[0]}
          if [ $RESULT -ne 0 ]; then
            echo "::error::Archive failed. Last 100 lines of log:"
            tail -100 $RUNNER_TEMP/archive_log.txt
            exit $RESULT
          fi

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: archive_log
          path: ${{ runner.temp }}/archive_log.txt

      - name: Verify archive
        run: |
          ls -la $RUNNER_TEMP/iCore.xcarchive/Products/Applications/
          file $RUNNER_TEMP/iCore.xcarchive/Products/Applications/iCore.app/iCore

      - name: Create unsigned IPA manually
        run: |
          cd $RUNNER_TEMP/iCore.xcarchive/Products/Applications
          mkdir -p Payload
          cp -r iCore.app Payload/
          zip -r $RUNNER_TEMP/iCore.ipa Payload
          ls -la $RUNNER_TEMP/iCore.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: iCore-IPA
          path: ${{ runner.temp }}/iCore.ipa
          if-no-files-found: error
