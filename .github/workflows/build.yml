name: Build iCore IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Download QEMU binary for iOS
        run: |
          curl -L "https://github.com/utmapp/UTM/releases/download/v4.5.0/UTM.ipa" \
            -o utm.ipa
          unzip -o utm.ipa "Payload/UTM.app/qemu-system-aarch64" \
            -d utm_out || true
          unzip -o utm.ipa "Payload/UTM.app/Libraries/qemu-system-aarch64" \
            -d utm_out || true
          find utm_out -name "qemu-system-aarch64" -type f
          mkdir -p iCore/Resources
          find utm_out -name "qemu-system-aarch64" -type f \
            -exec cp {} iCore/Resources/qemu-system-aarch64 \;
          ls -lh iCore/Resources/

      - name: Verify QEMU binary
        run: |
          ls -lh iCore/Resources/ || echo "Resources folder empty!"
          file iCore/Resources/qemu-system-aarch64 || echo "Binary not found!"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build App
        run: |
          xcodebuild build \
            -project iCore.xcodeproj \
            -scheme iCore \
            -destination "generic/platform=iOS" \
            -configuration Release \
            CONFIGURATION_BUILD_DIR=$HOME/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PRODUCT_BUNDLE_IDENTIFIER=com.xsaturnmoon.icore

      - name: Fix Info.plist Bundle ID
        run: |
          /usr/libexec/PlistBuddy -c \
            "Set :CFBundleIdentifier com.xsaturnmoon.icore" \
            $HOME/build/iCore.app/Info.plist
          /usr/libexec/PlistBuddy -c \
            "Set :CFBundleExecutable iCore" \
            $HOME/build/iCore.app/Info.plist
          echo "Bundle ID after fix:"
          /usr/libexec/PlistBuddy -c \
            "Print :CFBundleIdentifier" \
            $HOME/build/iCore.app/Info.plist

      - name: Package IPA
        run: |
          mkdir -p $HOME/Payload
          cp -r $HOME/build/iCore.app $HOME/Payload/
          cd $HOME
          zip -r iCore.ipa Payload/
          ls -lh iCore.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iCore-ipa
          path: ~/iCore.ipa
