name: Build iCore IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Download UTM QEMU libraries
        run: |
          curl -L https://github.com/utmapp/UTM/releases/latest/download/UTM.ipa \
            -o utm.ipa
          unzip utm.ipa -d utm_extracted || true
          mkdir -p iCore/Libraries
          cp -r utm_extracted/Payload/UTM.app/Libraries/. iCore/Libraries/ 2>/dev/null || true
          # Also grab the QEMU binary if present at various known paths
          for qbin in \
            utm_extracted/Payload/UTM.app/qemu-system-aarch64 \
            utm_extracted/Payload/UTM.app/Jailbreak/qemu-system-aarch64 \
            utm_extracted/Payload/UTM.app/Libraries/qemu-system-aarch64; do
            [ -f "$qbin" ] && cp "$qbin" iCore/Libraries/ && echo "Copied QEMU from $qbin" && break
          done
          ls -lh iCore/Libraries/ || echo "Libraries directory empty or not found"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project iCore.xcodeproj \
            -scheme iCore \
            -destination "generic/platform=iOS" \
            -archivePath "$HOME/iCore.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            SKIP_INSTALL=NO

      - name: Package IPA
        run: |
          APP_PATH=$(find "$HOME/iCore.xcarchive" -name "*.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          mkdir -p "$HOME/Payload"
          cp -r "$APP_PATH" "$HOME/Payload/"
          cd "$HOME"
          zip -r iCore.ipa Payload/
          ls -lh "$HOME/iCore.ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iCore-ipa
          path: ~/iCore.ipa
