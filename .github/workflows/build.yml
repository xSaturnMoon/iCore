name: Build iCore IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Download QEMU binary for iOS
        run: |
          curl -L "https://github.com/utmapp/UTM/releases/download/v4.5.0/UTM.ipa" \
            -o utm.ipa
          unzip -o utm.ipa "Payload/UTM.app/qemu-system-aarch64" \
            -d utm_out || true
          unzip -o utm.ipa "Payload/UTM.app/Libraries/qemu-system-aarch64" \
            -d utm_out || true
          find utm_out -name "qemu-system-aarch64" -type f
          mkdir -p iCore/Resources
          find utm_out -name "qemu-system-aarch64" -type f \
            -exec cp {} iCore/Resources/qemu-system-aarch64 \;
          ls -lh iCore/Resources/

      - name: Verify QEMU binary
        run: |
          ls -lh iCore/Resources/ || echo "Resources folder empty!"
          file iCore/Resources/qemu-system-aarch64 || echo "Binary not found!"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project iCore.xcodeproj \
            -scheme iCore \
            -destination "generic/platform=iOS" \
            -archivePath "$HOME/iCore.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            SKIP_INSTALL=NO

      - name: Package IPA
        run: |
          APP_PATH=$(find "$HOME/iCore.xcarchive" -name "*.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          mkdir -p "$HOME/Payload"
          cp -r "$APP_PATH" "$HOME/Payload/"
          cd "$HOME"
          zip -r iCore.ipa Payload/
          ls -lh "$HOME/iCore.ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iCore-ipa
          path: ~/iCore.ipa
