name: Build iCore IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build App
        run: |
          xcodebuild build \
            -project iCore.xcodeproj \
            -scheme iCore \
            -destination "generic/platform=iOS" \
            -configuration Release \
            CONFIGURATION_BUILD_DIR=$HOME/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PRODUCT_BUNDLE_IDENTIFIER=com.xsaturnmoon.icore \
            GENERATE_INFOPLIST_FILE=NO \
            INFOPLIST_FILE=Info.plist

      - name: Fix Info.plist
        run: |
          PLIST="$HOME/build/iCore.app/Info.plist"
          echo "Fixing plist at: $PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.xsaturnmoon.icore" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable iCore" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleDevelopmentRegion en" "$PLIST"
          echo "Bundle ID is now:"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$PLIST"

      - name: Package IPA
        run: |
          mkdir -p $HOME/Payload
          cp -r $HOME/build/iCore.app $HOME/Payload/
          cd $HOME
          zip -r iCore.ipa Payload/
          ls -lh iCore.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iCore-ipa
          path: ~/iCore.ipa
          