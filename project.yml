name: iCore

options:
  bundleIdPrefix: com.xsaturnmoon
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"

settings:
  base:
    ARCHS: arm64
    VALID_ARCHS: arm64
    SUPPORTS_MACCATALYST: false

targets:
  iCore:
    type: application
    platform: iOS
    sources: [iCore]
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: iCore.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.xsaturnmoon.icore
        TARGETED_DEVICE_FAMILY: "2"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SKIP_INSTALL: "NO"
        ENABLE_BITCODE: "NO"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: "NO"
    entitlements:
      path: iCore.entitlements
