name: iCore

options:
  bundleIdPrefix: com.xsaturnmoon
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    ARCHS: arm64
    VALID_ARCHS: arm64
    ONLY_ACTIVE_ARCH: NO
    SUPPORTS_MACCATALYST: NO

targets:
  iCore:
    type: application
    platform: iOS
    sources:
      - path: iCore
        excludes:
          - Resources/**
          - Libraries/**
      - path: iCore/Resources
        type: folder
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xsaturnmoon.icore
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "2"
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: iCore.entitlements
        ENABLE_BITCODE: NO
        SKIP_INSTALL: NO
